githubConfigUrl: "https://github.com/zarool/gitops-server"

minRunners: 2
maxRunners: 4

controllerServiceAccount:
  namespace: gitops
  name: arc-runner-controller-gha-rs-controller


# custom docker registry, copied from dind template
containerMode:
  type: ""

template:
  spec:
    imagePullSecrets:
      - name: harbor-config

    hostAliases:
      - ip: "10.43.150.184"
        hostnames:
        - "harbor.cloud.worker"

    securityContext:
      fsGroup: 1001
      runAsUser: 0
      runAsGroup: 0

    initContainers:
    - name: init-dind-externals
      image: ghcr.io/actions/actions-runner:latest
      command: ["cp", "-r", "/home/runner/externals/.", "/home/runner/tmpDir/"]
      volumeMounts:
        - name: dind-externals
          mountPath: /home/runner/tmpDir

    - name: dind
      image: docker:dind
      args:
        - dockerd
        - --host=unix:///var/run/docker.sock
        - --group=$(DOCKER_GROUP_GID)
        - --insecure-registry=harbor.cloud.worker:443
        - --insecure-registry=harbor.cloud.worker
        - --mtu=1400
      env:
        - name: DOCKER_GROUP_GID
          value: "123"
        - name: DOCKER_CONFIG
          value: /docker-config
      securityContext:
        privileged: true
      restartPolicy: Always
      startupProbe:
        exec:
          command:
            - docker
            - info
        initialDelaySeconds: 0
        failureThreshold: 24
        periodSeconds: 5
      volumeMounts:
        - name: work
          mountPath: /home/runner/_work
        - name: dind-sock
          mountPath: /var/run
        - name: dind-externals
          mountPath: /home/runner/externals

    containers:
    - name: runner
      image: docker-registry:5000/local-server-runner:0.0.2
      command: ["/home/runner/run.sh"]
      env:
        - name: DOCKER_HOST
          value: unix:///var/run/docker.sock
        - name: RUNNER_WAIT_FOR_DOCKER_IN_SECONDS
          value: "20"
        - name: RUNNER_ALLOW_RUNASROOT
          value: "true"
        - name: DOCKER_CONFIG
          value: /home/runner/.docker/
      volumeMounts:
        - name: work
          mountPath: /home/runner/_work
        - name: dind-sock
          mountPath: /var/run

    volumes:
    - name: work
      emptyDir: {}
    - name: dind-sock
      emptyDir: {}
    - name: dind-externals
      emptyDir: {}
