name: GitOps Docker

on:
  push:
    paths:
      - 'src/docker/**'

env:
  TARGET_FOLDER: 'src/docker'
  IMAGE_REGISTRY: "harbor.cloud.worker"
  IMAGE_PROJECT: "local"

jobs:
  prepare:
    runs-on: arc-runner-set
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
      run_build: ${{ steps.set-matrix.outputs.run_build }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Get changed folders
        id: changed-files
        uses: tj-actions/changed-files@v47.0.6
        with:
          dir_names: true
          files: ${{ env.TARGET_FOLDER }}/**

      - name: Generate Matrix JSON
        id: set-matrix
        run: |
          folders="${{ steps.changed-files.outputs.all_changed_files }}"
          if [ -z "$folders" ]; then
            echo "run_build=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          JSON_ARRAY="[]"
          for folder in $folders; do
            IMG_NAME=$(grep 'name=' "$folder/application.conf" | cut -d'=' -f2 | xargs)
            IMG_TAG=$(grep 'version=' "$folder/application.conf" | cut -d'=' -f2 | xargs)

            JSON_ARRAY=$(echo "$JSON_ARRAY" | jq -c ". += [{\"path\": \"$folder\", \"name\": \"$IMG_NAME\", \"tag\": \"$IMG_TAG\"}]")
          done

          echo "matrix=$JSON_ARRAY" >> $GITHUB_OUTPUT
          echo "run_build=true" >> $GITHUB_OUTPUT


  build:
    needs: prepare
    if: needs.prepare.outputs.run_build == 'true'
    runs-on: arc-runner-set
    strategy:
      fail-fast: false
      matrix:
        include: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v6

      - name: Login to Harbor
        run: echo "${{ secrets.HARBOR_PASSWORD }}" | docker login ${{ env.IMAGE_REGISTRY }} -u ${{ secrets.HARBOR_USERNAME }} --password-stdin

      - name: Build docker image
        run: |
          docker build -t ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_PROJECT }}/${{ matrix.name }}:${{ matrix.tag }} ./${{ matrix.path }}

      - name: Push to registry
        run: |
          docker push ${{ env.IMAGE_REGISTRY }}/${{ env.IMAGE_PROJECT }}/${{ matrix.name }}:${{ matrix.tag }}
